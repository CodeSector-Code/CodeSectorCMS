name: Sync GitHub Repo To Azure DevOps Repo

on:
  push:
    branches:
      - main # or your default branch
    pull_request:

jobs:
  SyncGitHubToAzureDevOps:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout GitHub repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # ensures all history is fetched

    - name: Push to Azure DevOps repository
      env:
        AZURE_DEVOPS_ORG: CodeSectordoo # e.g., 'myorg'
        AZURE_DEVOPS_PROJECT: CodeSectorCMS # e.g., 'myproject'
        AZURE_DEVOPS_REPO: CodeSectorCMS # e.g., 'my-repo'
      run: |
        git remote add azuredevops https://CodeSectordoo:${{ secrets.PAT_AZURE_DEVOPS }}@dev.azure.com/${{ env.AZURE_DEVOPS_ORG }}/${{ env.AZURE_DEVOPS_PROJECT }}/_git/${{ env.AZURE_DEVOPS_REPO }}
        git push azuredevops main --force # push to the main branch in Azure DevOps

