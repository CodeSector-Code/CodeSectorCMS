name: Deploy CodeSectorCMS.Web to Azure AppService

on:
  push:
    paths:
      - 'CodeSectorCMS.Web/**'
      - 'CodeSectorCMS.Domain/**'
      - '.github/workflows/deploy-to-Azure-Web-project.yaml'
  pull_request:
    paths:
        - 'CodeSectorCMS.Web/**'
        - 'CodeSectorCMS.Domain/**'
        - '.github/workflows/deploy-to-Azure-Web-project.yaml'
  workflow_dispatch:

env:
  SERVER_APP_NAME: "CodeSectorCMS-Web"
  RESOURCE_GROUP: "CodeSector"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: dotnet restore ./CodeSectorCMS.Web/CodeSectorCMS.Web.csproj

      - name: Build
        run: dotnet build ./CodeSectorCMS.Web/CodeSectorCMS.Web.csproj

      - name: Publish
        run: dotnet publish ./CodeSectorCMS.Web/CodeSectorCMS.Web.csproj --configuration Release --output ./publish

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update App Service Connection String
        run: |
          az webapp config connection-string set --name ${{ env.SERVER_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --settings DefaultConnection="${{ secrets.DB_SOMEE_CONNECTION_STRING }}" --connection-string-type SqlServer
        # az webapp config appsettings set --name ${{ env.SERVER_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --settings ConnectionStrings__DefaultConnection="${{ secrets.DB_SOMEE_CONNECTION_STRING }}"
        # For a standard connection string (not an app setting), use the 'connection-string' command:

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.SERVER_APP_NAME }}
          publish-profile: ${{ secrets.SERVER_PUBLISH_PROFILE_WEB }}
          package: ./publish